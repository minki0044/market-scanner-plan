<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<meta name="robots" content="noindex, nofollow"/>
<title>Market Scanner</title>
<style>
  :root{--bg:#0a1530;--card:#101d3d;--line:#26345c;--ink:#fff;--mute:#9fb0d6;--accent:#7c6cf0;}
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'Pretendard',-apple-system,BlinkMacSystemFont,system-ui,sans-serif;background:var(--bg);color:var(--ink);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;}
  .box{width:100%;max-width:360px;background:var(--card);border:1px solid var(--line);border-radius:16px;padding:36px 32px;text-align:center;}
  .mark{font-size:20px;font-weight:600;letter-spacing:-0.02em;margin-bottom:6px;}
  .mark em{font-style:normal;color:#c9bdfb;}
  .sub{font-size:13px;color:var(--mute);margin-bottom:24px;}
  form{display:flex;gap:8px;}
  input{flex:1;background:#0a1530;border:1px solid var(--line);border-radius:9px;padding:12px 14px;color:#fff;font-size:15px;outline:none;}
  input:focus{border-color:var(--accent);}
  button{background:var(--accent);border:none;border-radius:9px;padding:0 18px;color:#fff;font-size:14px;font-weight:600;cursor:pointer;}
  button:disabled{opacity:.5;cursor:default;}
  .err{color:#ff8b8b;font-size:12px;margin-top:14px;min-height:16px;}
</style>
</head>
<body>
  <div class="box">
    <div class="mark">Market <em>Scanner</em></div>
    <div class="sub">비밀번호를 입력하세요</div>
    <form id="f">
      <input id="pw" type="password" inputmode="numeric" autocomplete="off" autofocus placeholder="••••"/>
      <button id="go" type="submit">열기</button>
    </form>
    <div class="err" id="err"></div>
  </div>

const b64=s=>Uint8Array.from(atob(s),c=>c.charCodeAt(0));
async function decrypt(pw){
  const km=await crypto.subtle.importKey('raw',new TextEncoder().encode(pw),'PBKDF2',false,['deriveKey']);
  const key=await crypto.subtle.deriveKey({name:'PBKDF2',salt:b64(SALT),iterations:ITER,hash:'SHA-256'},km,{name:'AES-GCM',length:256},false,['decrypt']);
  const plain=await crypto.subtle.decrypt({name:'AES-GCM',iv:b64(IV)},key,b64(PAYLOAD));
  return new TextDecoder().decode(plain);
}

f.addEventListener('submit',async e=>{
  e.preventDefault();err.textContent='';go.disabled=true;
  try{
    const html=await decrypt(pw.value);
    document.open();document.write(html);document.close();
  }catch(_){
    err.textContent='비밀번호가 올바르지 않습니다.';go.disabled=false;pw.value='';pw.focus();

});
